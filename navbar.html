<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navbar</title>
  <style>
    body {
      background-color: #000; /* For preview */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    nav {
      background-color: #05071a;
      border: 1px solid #1a1f3c;
      border-radius: 30px;
      padding: 8px 20px;
      display: flex;
      gap: 24px;
      font-family: Arial, sans-serif;
    }

    nav a {
      color: #d1d5db;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 20px;
      transition: 0.3s ease;
    }

    nav a.active {
      background-color: #0c1133;
      color: #fff;
    }

    nav a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#" class="active">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Features</a>
    <a href="#">Pricing</a>
    <a href="#">Works</a>
  </nav>
</body>
</html>
